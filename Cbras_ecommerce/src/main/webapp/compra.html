<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cbras+ | Proceso de compra</title>
    <link rel="stylesheet" href="styles/compra.css">
</head>

<body>

    <div class="container">
        <header class="top-header">
            <div class="top-icons">
                <a href="perfil.html" title="Perfil"><img
                        src="https://www.pngall.com/wp-content/uploads/5/User-Profile-PNG-Free-Download.png"></a>
                <a href="login.html" title="Cerrar Sesión"><img
                        src="https://tse1.mm.bing.net/th/id/OIP.SvKmcbRgMDdRA9Hb2_YZigHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"></a>
            </div>
        </header>

        <aside class="sidebar">
            <nav>
                <a href="index.html">Inicio</a>
                <a href="catalogo.html">Catálogo de productos</a>
                <a href="carrito.html">Carrito de compras</a>
                <a href="pedidos.html">Gestión de pedidos</a>
                <a href="admin.html">Administrador</a>
                <a href="login.html">Iniciar sesión</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Proceso de compra</h1>

            <div class="checkout-container">
                <div class="options-section">
                    <section class="checkout-card">
                        <h3>Dirección</h3>
                        <div class="address-options">
                            <div class="address-box">
                                <input type="radio" name="address" id="addr-default" checked>
                                <label for="addr-default">Predeterminada</label>
                            </div>
                            <div class="address-box">
                                <input type="radio" name="address" id="addr-new">
                                <label for="addr-new">Nueva</label>
                            </div>
                        </div>
                    </section>

                    <section class="checkout-card">
                        <h3>Metodo de pago</h3>
                        <div class="payment-list">
                            <div class="payment-item">
                                <input type="radio" name="payment" id="pay-card">
                                <label for="pay-card">Tarjeta de crédito / Débito</label>
                            </div>
                            <div class="payment-item">
                                <input type="radio" name="payment" id="pay-paypal">
                                <label for="pay-paypal">PayPal</label>
                            </div>
                            <div class="payment-item">
                                <input type="radio" name="payment" id="pay-transfer">
                                <label for="pay-transfer">Transferencia bancaria</label>
                            </div>
                        </div>
                    </section>
                </div>

                <aside class="summary-section">
                    <div class="summary-card">
                        <h3>Resumen de compra</h3>
                        <div class="summary-item">
                            <span>x1 Chaqueta</span>
                            <span>$ 449.99</span>
                        </div>
                        <div class="summary-item">
                            <span>x2 Playera loca</span>
                            <span>$ 200.00</span>
                        </div>
                        <div class="summary-total">
                            <span>Total:</span>
                            <span>$ 649.99</span>
                        </div>
                        <a href="confirmacion.html" class="btn-order">Hacer pedido</a>
                    </div>
                </aside>
            </div>
        </main>

        <footer class="footer">
            Aplicaciones Web – Unidad 2
        </footer>
    </div>

</body>

</html>
