<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cbras+ | Iniciar Sesión</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/login.css">
</head>

<body>

    <div class="container">
        <header class="top-header">
            <div class="top-icons">
                <a href="perfil.html" title="Perfil"><img
                        src="https://www.pngall.com/wp-content/uploads/5/User-Profile-PNG-Free-Download.png"></a>
                <a href="login.html" title="Cerrar Sesión"><img
                        src="https://tse1.mm.bing.net/th/id/OIP.SvKmcbRgMDdRA9Hb2_YZigHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"></a>
            </div>
        </header>

        <aside class="sidebar">
            <nav>
                <a href="index.html">Inicio</a>
                <a href="catalogo.html">Catálogo de productos</a>
                <a href="carrito.html">Carrito de compras</a>
                <a href="pedidos.html">Gestión de pedidos</a>
                <a href="admin.html">Administrador</a>
                <a href="login.html">Iniciar sesión</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Iniciar Sesión</h1>

            <div class="login-form-container">
                <form action="index.html">
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" class="form-input" placeholder="example@gmail.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" class="form-input" placeholder="password" required>
                    </div>

                    <button type="submit" class="btn-login">Iniciar Sesión</button>

                    <div class="login-links">
                        <a href="registro.html">Registrarse</a>
                        <a href="index.html" style="margin-top: 10px; color: var(--gray-text);">Regresar al inicio</a>
                    </div>
                </form>
            </div>
        </main>

        <footer class="footer">
            Aplicaciones Web – Unidad 2
        </footer>
    </div>

</body>

</html>
