<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cbras+ | Reseñar Producto</title>
    <link rel="stylesheet" href="styles/reseña.css">
</head>

<body>

    <div class="container">
        <header class="top-header">
            <div class="top-icons">
                <a href="perfil.html" title="Perfil"><img
                        src="https://www.pngall.com/wp-content/uploads/5/User-Profile-PNG-Free-Download.png"></a>
                <a href="login.html" title="Cerrar Sesión"><img
                        src="https://tse1.mm.bing.net/th/id/OIP.SvKmcbRgMDdRA9Hb2_YZigHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"></a>
            </div>
        </header>

        <aside class="sidebar">
            <nav>
                <a href="index.html">Inicio</a>
                <a href="catalogo.html">Catálogo de productos</a>
                <a href="carrito.html">Carrito de compras</a>
                <a href="pedidos.html">Gestión de pedidos</a>
                <a href="admin.html">Administrador</a>
                <a href="login.html">Iniciar sesión</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Reseñar producto</h1>

            <div class="review-form-container">
                <form action="catalogo.html">
                    <div class="form-group">
                        <label for="product">Producto:</label>
                        <input type="text" id="product" class="input-product" value="Chaqueta clasic" readonly>
                    </div>

                    <div class="form-group">
                        <label for="score">Puntuación</label>
                        <input type="number" id="score" class="input-score" min="1" max="5" placeholder="1 - 5"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="opinion">Tu opinión</label>
                        <textarea id="opinion" class="textarea-opinion"
                            placeholder="Cuentanos que te parecio el producto..." required></textarea>
                    </div>

                    <div class="action-buttons">
                        <button type="submit" class="btn-send">Enviar reseña</button>
                        <a href="catalogo.html" class="btn-cancel">Cancelar</a>
                    </div>
                </form>
            </div>
        </main>

        <footer class="footer">
            Aplicaciones Web – Unidad 2
        </footer>
    </div>

</body>

</html>
