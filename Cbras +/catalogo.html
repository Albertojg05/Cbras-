<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cbras+ | Catálogo de productos</title>
    <link rel="stylesheet" href="styles/catalogo.css">
</head>

<body>

    <div class="container">
        <header class="top-header">
            <div class="top-icons">
                <a href="perfil.html" title="Perfil"><img
                        src="https://www.pngall.com/wp-content/uploads/5/User-Profile-PNG-Free-Download.png"></a>
                <a href="login.html" title="Cerrar Sesión"><img
                        src="https://tse1.mm.bing.net/th/id/OIP.SvKmcbRgMDdRA9Hb2_YZigHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"></a>
            </div>
        </header>

        <aside class="sidebar">
            <nav>
                <a href="index.html">Inicio</a>
                <a href="catalogo.html">Catálogo de productos</a>
                <a href="carrito.html">Carrito de compras</a>
                <a href="pedidos.html">Gestión de pedidos</a>
                <a href="admin.html">Administrador</a>
                <a href="login.html">Iniciar sesión</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Catálogo productos</h1>

            <section class="filter-container">
                <input type="text" class="filter-input" placeholder="Buscar por nombre">
                <input type="number" class="filter-input" placeholder="Precio ($)">
                
                <div class="filter-radio-group">
                    <input type="radio" id="mayor" name="precio-filter" value="mayor">
                    <label for="mayor">Mayor que</label>
                </div>
                
                <div class="filter-radio-group">
                    <input type="radio" id="menor" name="precio-filter" value="menor">
                    <label for="menor">Menor que</label>
                </div>

                <button type="button" class="btn-filter">Filtrar</button>
            </section>

            <table class="product-table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Detalles del producto</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Chaqueta clasic</td>
                        <td>$ 449.99</td>
                        <td><a href="detalles.html">Ver detalles</a></td>
                        <td class="action-buttons">
                            <button class="btn-add-cart"><a href="carrito.html">Agregar al carrito</a></button>
                            <button class="btn-review"><a href="reseña.html">Reseñar</a></button>
                        </td>
                    </tr>
                    <tr>
                        <td>&nbsp;</td>
                        <td>&nbsp;</td>
                        <td>&nbsp;</td>
                        <td>&nbsp;</td>
                    </tr>
                </tbody>
            </table>
        </main>

        <footer class="footer">
            Aplicaciones Web – Unidad 2
        </footer>
    </div>

</body>

</html>
