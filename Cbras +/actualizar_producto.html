<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cbras+ | Actualizar Producto</title>
    <link rel="stylesheet" href="styles/actualizar_producto.css">
</head>

<body>
    <div class="container">
        <header class="top-header">
            <div class="top-icons">
                <a href="perfil.html" title="Perfil"><img src="https://www.pngall.com/wp-content/uploads/5/User-Profile-PNG-Free-Download.png" alt="Perfil"></a>
                <a href="login.html" title="Cerrar Sesión"><img src="https://tse1.mm.bing.net/th/id/OIP.SvKmcbRgMDdRA9Hb2_YZigHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Salir"></a>
            </div>
        </header>

        <aside class="sidebar">
            <nav>
                <a href="index.html">Inicio</a>
                <a href="catalogo.html">Catálogo de productos</a>
                <a href="carrito.html">Carrito</a>
                <a href="pedidos.html">Gestión de pedidos</a>
                <a href="admin.html">Administrador</a>
                <a href="login.html">Iniciar sesión</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Actualizar Producto</h1>

            <div class="form-card">
                <form action="admin_catalogo.html">
                    <div class="form-group">
                        <label for="nombre">Nombre del producto</label>
                        <input type="text" id="nombre" class="form-input" value="Chaqueta clasic" required>
                    </div>

                    <div class="form-group-row">
                        <div class="form-group">
                            <label for="precio">Precio</label>
                            <input type="number" id="precio" class="form-input" value="449.99" required>
                        </div>

                        <div class="form-group">
                            <label for="stock">Stock disponible</label>
                            <input type="number" id="stock" class="form-input" value="15" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" class="form-textarea" required>100% algodón orgánico. Lavar a máquina con agua fría y no usar blanqueador.</textarea>
                    </div>

                    <div class="form-group">
                        <label for="imagen">Imagen del producto</label>
                        <input type="text" id="imagen" class="form-input" value="chaqueta-clasic.png">
                    </div>

                    <div class="action-buttons">
                        <button type="submit" class="btn-save">Guardar cambios</button>
                        <a href="admin_catalogo.html" class="btn-delete">Eliminar</a>
                    </div>
                </form>
            </div>
        </main>

        <footer class="footer">Aplicaciones Web – Unidad 2</footer>
    </div>
</body>

</html>
