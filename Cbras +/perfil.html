    <meta charset="UTF-8">

</head>

<body>

    <div class="container">
        <header class="top-header">
            <div class="top-icons">
                <a href="perfil.html" title="Perfil"><img
                        src="https://www.pngall.com/wp-content/uploads/5/User-Profile-PNG-Free-Download.png"></a>
                <a href="login.html" title="Cerrar Sesión"><img
                        src="https://tse1.mm.bing.net/th/id/OIP.SvKmcbRgMDdRA9Hb2_YZigHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"></a>
            </div>
        </header>

        <aside class="sidebar">
            <nav>
                <a href="index.html">Inicio</a>
                <a href="catalogo.html">Catálogo de productos</a>
                <a href="carrito.html">Carrito de compras</a>
                <a href="pedidos.html">Gestión de pedidos</a>
                <a href="admin.html">Administrador</a>
                <a href="login.html">Iniciar sesión</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Mi cuenta</h1>

            <div class="user-profile-header">
                <img src="https://www.pngall.com/wp-content/uploads/5/User-Profile-PNG-Free-Download.png" alt="Usuario">
                <div class="user-info-text">
                    <h2>Usuario123</h2>
                    <p>usuario123@gmail.com</p>
                </div>
            </div>

            <div class="profile-card">
                <form action="#">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fullname">Nombre completo</label>
                            <input type="text" id="fullname" class="form-input" value="Usuario loco">
                        </div>
                        
                        <div class="form-group">
                            <label for="phone">Número de teléfono</label>
                            <input type="tel" id="phone" class="form-input" value="1234567890">
                        </div>

                        <div class="form-group">
                            <label for="email">Correo Electrónico</label>
                            <input type="email" id="email" class="form-input" value="usuario123@gmail.com">
                        </div>

                        <div class="form-group">
                            <label for="address">Dirección</label>
                            <input type="text" id="address" class="form-input" value="Calle Ejemplo #123">
                        </div>
                    </div>

                    <div class="button-container">
                        <button type="submit" class="btn-save">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </main>

        <footer class="footer">
            Aplicaciones Web – Unidad 2
        </footer>
    </div>

</body>
